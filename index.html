<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Trap Race Deluxe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --border: rgba(0,0,0,0.12);
      --text: #1a1a1a;
      --muted: #666;
      --accent: #1a1a1a;
      --success-bg: #eaf3de;
      --success-txt: #27500a;
      --warn-bg: #faeeda;
      --warn-txt: #633806;
      --info-bg: #e6f1fb;
      --info-txt: #0c447c;
      --danger-bg: #fcebeb;
      --danger-txt: #791f1f;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1rem;
    }

    #app {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    h1 { font-size: 24px; font-weight: 600; margin-bottom: 0.25rem; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 0.4rem; }
    p  { font-size: 14px; color: var(--muted); line-height: 1.5; }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      background: var(--card);
      color: var(--text);
      margin: 5px 0;
      outline: none;
    }
    input[type="text"]:focus { border-color: rgba(0,0,0,0.4); }

    button {
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 500;
      padding: 11px 16px;
      border: 0.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      margin-top: 6px;
    }
    button:active { opacity: 0.8; transform: scale(0.98); }
    .btn-primary { background: var(--text); color: var(--card); border: none; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button { margin-top: 0; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 0.6rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .b-lobby  { background: var(--info-bg);    color: var(--info-txt); }
    .b-char   { background: var(--warn-bg);    color: var(--warn-txt); }
    .b-map    { background: var(--success-bg); color: var(--success-txt); }
    .b-build  { background: #faeeda;           color: #633806; }
    .b-race   { background: var(--success-bg); color: var(--success-txt); }
    .b-done   { background: #f1efe8;           color: #444; }

    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 0.6rem 0;
    }

    .sel-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      background: var(--card);
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .sel-card.active {
      border-color: var(--text);
      background: var(--bg);
    }
    .sel-card .icon { font-size: 24px; margin-bottom: 3px; }
    .sel-card .name { font-size: 13px; font-weight: 600; color: var(--text); }
    .sel-card .desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 0.5px solid var(--border);
      font-size: 13px;
    }
    .row:last-child { border-bottom: none; }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    .trap-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin: 0.5rem 0;
    }
    .tbtn {
      flex: 1;
      min-width: 56px;
      padding: 7px 4px;
      font-size: 11px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      text-align: center;
      border-left-width: 3px;
    }
    .tbtn.on { border-color: var(--text); background: var(--bg); }

    canvas {
      display: block;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      touch-action: none;
      width: 100%;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .ctrl-btn {
      flex: 1;
      padding: 16px 8px;
      font-size: 22px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 0.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .ctrl-btn:active { background: var(--border); }

    .gold { color: #b8860b; font-weight: 600; }
    .medal { font-size: 16px; }

    .pu-pill {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--warn-bg);
      color: var(--warn-txt);
      font-weight: 600;
      margin-left: 6px;
    }

    .room-code {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      text-align: center;
      padding: 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      margin: 0.5rem 0;
      color: var(--text);
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .hp-bar {
      height: 5px;
      background: #e0e0e0;
      border-radius: 3px;
      margin: 4px 0;
      overflow: hidden;
    }
    .hp-fill { height: 5px; border-radius: 3px; background: #639922; transition: width 0.2s; }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--card);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    .loader {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 14px;
    }

    .firebase-note {
      background: var(--info-bg);
      color: var(--info-txt);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 1rem;
      border: 0.5px solid rgba(55,138,221,0.3);
    }
  </style>
</head>
<body>
<div id="app"><div class="loader">Loading game...</div></div>
<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getDatabase, ref, set, get, onValue, off, update
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ─── FIREBASE CONFIG ───────────────────────────────────────────────────────────
// Replace these values with your own Firebase project config.
// Get it from: Firebase Console → Project Settings → Your apps → Web app config
const FIREBASE_CONFIG = {
  apiKey:            "REPLACE_WITH_YOUR_API_KEY",
  authDomain:        "REPLACE_WITH_YOUR_AUTH_DOMAIN",
  databaseURL:       "REPLACE_WITH_YOUR_DATABASE_URL",
  projectId:         "REPLACE_WITH_YOUR_PROJECT_ID",
  storageBucket:     "REPLACE_WITH_YOUR_STORAGE_BUCKET",
  messagingSenderId: "REPLACE_WITH_YOUR_MESSAGING_SENDER_ID",
  appId:             "REPLACE_WITH_YOUR_APP_ID"
};
// ──────────────────────────────────────────────────────────────────────────────

const RACE_DUR   = 60;
const BUILD_DUR  = 25;

const COLORS = [
  '#E24B4A','#378ADD','#639922','#D4537E',
  '#BA7517','#7F77DD','#1D9E75','#D85A30'
];

const CHARACTERS = [
  { id:'ninja',  name:'Ninja',  desc:'Super fast',          icon:'🥷',  speed:0.009, jump:-0.032, size:7 },
  { id:'robot',  name:'Robot',  desc:'30% less damage',     icon:'🤖',  speed:0.006, jump:-0.026, size:9,  armor:true },
  { id:'witch',  name:'Witch',  desc:'Double jump',         icon:'🧙',  speed:0.007, jump:-0.028, size:7,  dblJump:true },
  { id:'ghost',  name:'Ghost',  desc:'Spikes harmless',     icon:'👻',  speed:0.0065,jump:-0.029, size:7,  ghost:true },
  { id:'knight', name:'Knight', desc:'Immune to ice',       icon:'⚔️', speed:0.0065,jump:-0.027, size:8,  iceImmune:true },
  { id:'fairy',  name:'Fairy',  desc:'Floaty jumps',        icon:'🧚',  speed:0.007, jump:-0.036, size:6,  slowFall:true },
];

const MAPS = [
  { id:'grass', name:'Grassland', icon:'🌿', sky:'#d4edda', ground:'#2d6a4f', groundLight:'#95d5b2', platforms:[] },
  { id:'lava',  name:'Lava World',icon:'🌋', sky:'#fce4d6', ground:'#9d2b05', groundLight:'#f4845f',
    platforms:[{x:.18,y:.54,w:.13,h:.04},{x:.47,y:.44,w:.11,h:.04},{x:.73,y:.53,w:.12,h:.04}] },
  { id:'ice',   name:'Ice Kingdom',icon:'❄️',sky:'#dbeeff', ground:'#1a5f99', groundLight:'#74b3e8',
    platforms:[{x:.14,y:.49,w:.15,h:.04},{x:.44,y:.41,w:.13,h:.04},{x:.69,y:.51,w:.13,h:.04}], slippery:true },
  { id:'night', name:'Night City', icon:'🌃', sky:'#1a1035', ground:'#3c3289', groundLight:'#7b6fd4',
    platforms:[{x:.22,y:.52,w:.11,h:.04},{x:.5,y:.43,w:.14,h:.04},{x:.76,y:.53,w:.1,h:.04}] },
];

const TRAPS = [
  { id:'spike',  lbl:'Spike',  icon:'▲', col:'#E24B4A', dmg:35 },
  { id:'pit',    lbl:'Pit',    icon:'◉', col:'#333',    dmg:55 },
  { id:'ice',    lbl:'Ice',    icon:'❄', col:'#378ADD', dmg:0, slow:true },
  { id:'spring', lbl:'Spring', icon:'⟳', col:'#BA7517', dmg:0, bounce:true },
  { id:'bomb',   lbl:'Bomb',   icon:'💣',col:'#E24B4A', dmg:45 },
  { id:'web',    lbl:'Web',    icon:'◈', col:'#888',    dmg:0, sticky:true },
];

const POWERUP_TYPES = [
  { id:'shield', icon:'🛡', col:'#639922', lbl:'Shield 8s' },
  { id:'boost',  icon:'⚡', col:'#BA7517', lbl:'Speed 5s' },
  { id:'heal',   icon:'💊', col:'#1D9E75', lbl:'+40 HP' },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let db, roomRef, myId='', myRoom='', myName='', myChar=null, myMap=null;
let roomData=null, unsubscribe=null;
let canvas=null, ctx=null;
let myX=0.03, myY=0.65, myVX=0, myVY=0, myHP=100, myFinished=false, myJumps=0;
let moving=false, raceTimer=null, lastSave=0;
let activePowerup=null, shielded=false, boosted=false;
let selectedTrap='spike';

// ─── UTILS ───────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9); }
function amHost() { return roomData && roomData.hostId === myId; }
function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function getChar(id) { return CHARACTERS.find(c=>c.id===id) || CHARACTERS[0]; }
function getMap(id)  { return MAPS.find(m=>m.id===id)  || MAPS[0]; }
function getTrap(id) { return TRAPS.find(t=>t.id===id) || TRAPS[0]; }

// ─── FIREBASE INIT ───────────────────────────────────────────────────────────
function initFirebase() {
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    return true;
  } catch(e) {
    return false;
  }
}

async function dbSet(path, data) {
  await set(ref(db, path), data);
}
async function dbUpdate(path, data) {
  await update(ref(db, path), data);
}
async function dbGet(path) {
  const snap = await get(ref(db, path));
  return snap.exists() ? snap.val() : null;
}
function dbListen(path, cb) {
  const r = ref(db, path);
  onValue(r, snap => cb(snap.exists() ? snap.val() : null));
  return () => off(r);
}

// ─── JOIN / CREATE ROOM ───────────────────────────────────────────────────────
async function joinRoom() {
  myName = document.getElementById('iname').value.trim() || 'Player';
  myRoom = (document.getElementById('iroom').value.trim() || uid().slice(0,6)).toUpperCase().slice(0,8);
  myId   = uid();

  let room = await dbGet(`rooms/${myRoom}`);
  const colorIdx = room ? Object.keys(room.players||{}).length : 0;

  if (!room) {
    room = {
      phase:'charselect', hostId:myId, mapId:'grass', round:0,
      players:{}, traps:[], powerupSpawns:[], timer:0
    };
    await dbSet(`rooms/${myRoom}`, room);
  }

  await dbUpdate(`rooms/${myRoom}/players/${myId}`, {
    name: myName, hp:100, x:0.03, y:0.65, finished:false,
    score:0, color:COLORS[colorIdx%COLORS.length], charId:'ninja',
    shielded:false, powerup:null
  });

  roomData = await dbGet(`rooms/${myRoom}`);
  startListening();
  showCharSelect();
}

function startListening() {
  if (unsubscribe) unsubscribe();
  unsubscribe = dbListen(`rooms/${myRoom}`, data => {
    if (!data) return;
    const prevPhase = roomData ? roomData.phase : null;
    roomData = data;
    if (prevPhase !== data.phase) renderPhase();
    else syncUI();
  });
}

function renderPhase() {
  if (!roomData) return;
  if (raceTimer) { clearInterval(raceTimer); raceTimer=null; }
  const p = roomData.phase;
  if (p==='charselect') showCharSelect();
  else if (p==='mapselect') showMapSelect();
  else if (p==='build')  showBuild();
  else if (p==='race')   initRaceUI();
  else if (p==='results') showResults();
}

function syncUI() {
  if (!roomData) return;
  if (roomData.phase==='lobby' || roomData.phase==='charselect') showCharSelect();
  else if (roomData.phase==='build') refreshBuildCanvas();
  else if (roomData.phase==='results') showResults();
}

// ─── CHARACTER SELECT ────────────────────────────────────────────────────────
function showCharSelect() {
  myChar = getChar((roomData.players[myId]||{}).charId||'ninja');
  const players = Object.values(roomData.players||{});
  document.getElementById('app').innerHTML = `
    <div class="card">
      <span class="badge b-char">Choose character</span>
      <h2>Pick your fighter</h2>
      <p>Room code — share with friends:</p>
      <div class="room-code">${myRoom}</div>
      <div class="grid2">${CHARACTERS.map(c=>`
        <div class="sel-card ${myChar.id===c.id?'active':''}" onclick="pickChar('${c.id}')">
          <div class="icon">${c.icon}</div>
          <div class="name">${c.name}</div>
          <div class="desc">${c.desc}</div>
        </div>`).join('')}
      </div>
      <p style="margin:.4rem 0;font-size:12px">Players joined: ${players.map(p=>`<span style="color:${p.color}">●</span> ${p.name}`).join('  ')}</p>
      ${amHost()
        ? `<button class="btn btn-primary" onclick="hostGoMapSelect()">Next: Pick Map →</button>`
        : `<p style="text-align:center;margin-top:.5rem;font-size:13px">⏳ Waiting for host to continue...</p>`}
    </div>`;
}

async function pickChar(id) {
  myChar = getChar(id);
  await dbUpdate(`rooms/${myRoom}/players/${myId}`, { charId: id });
}

async function hostGoMapSelect() {
  await dbUpdate(`rooms/${myRoom}`, { phase:'mapselect' });
}

// ─── MAP SELECT ───────────────────────────────────────────────────────────────
function showMapSelect() {
  myMap = getMap(roomData.mapId||'grass');
  document.getElementById('app').innerHTML = `
    <div class="card">
      <span class="badge b-map">Choose map</span>
      <h2>Pick the arena</h2>
      <div class="grid2">${MAPS.map(m=>`
        <div class="sel-card ${myMap.id===m.id?'active':''}" onclick="${amHost()?`pickMap('${m.id}')`:''}"
             style="${!amHost()?'opacity:.55;cursor:default':''}">
          <div class="icon">${m.icon}</div>
          <div class="name">${m.name}</div>
          <div class="desc">${m.slippery?'Slippery!':m.platforms.length?'Platforms':'Open field'}</div>
        </div>`).join('')}
      </div>
      ${amHost()
        ? `<button class="btn btn-primary" onclick="hostStartBuild()">Start Build Phase →</button>`
        : `<p style="text-align:center;margin-top:.5rem;font-size:13px">⏳ Host is choosing the map...</p>`}
    </div>`;
}

async function pickMap(id) {
  myMap = getMap(id);
  await dbUpdate(`rooms/${myRoom}`, { mapId: id });
  showMapSelect();
}

async function hostStartBuild() {
  const map = getMap(roomData.mapId||'grass');
  const spawns = [
    { px:0.3, py: map.platforms.length?0.37:0.55, type: POWERUP_TYPES[Math.floor(Math.random()*3)].id, alive:true },
    { px:0.62,py: map.platforms.length?0.34:0.55, type: POWERUP_TYPES[Math.floor(Math.random()*3)].id, alive:true },
  ];
  const updates = { phase:'build', timer: Date.now()+BUILD_DUR*1000, traps:[], powerupSpawns:spawns };
  const players = roomData.players||{};
  Object.keys(players).forEach(id => {
    updates[`players/${id}/hp`]       = 100;
    updates[`players/${id}/x`]        = 0.03;
    updates[`players/${id}/y`]        = 0.65;
    updates[`players/${id}/finished`] = false;
    updates[`players/${id}/shielded`] = false;
    updates[`players/${id}/powerup`]  = null;
  });
  await dbUpdate(`rooms/${myRoom}`, updates);
}

// ─── BUILD PHASE ─────────────────────────────────────────────────────────────
function showBuild() {
  myMap = getMap(roomData.mapId||'grass');
  const rem = Math.max(0, Math.ceil((roomData.timer - Date.now())/1000));
  document.getElementById('app').innerHTML = `
    <div class="card" style="padding:1rem">
      <div class="info-bar">
        <span class="badge b-build" style="margin:0">Build Phase</span>
        <span id="build-timer" style="font-size:18px;font-weight:700;color:#633806">${rem}s</span>
      </div>
      <p style="margin-bottom:.5rem">Tap the track to place your trap. Make it evil.</p>
      <div class="trap-row">${TRAPS.map(t=>`
        <div class="tbtn ${selectedTrap===t.id?'on':''}" onclick="pickTrap('${t.id}')"
             style="border-left-color:${t.col}">${t.icon} ${t.lbl}</div>`).join('')}
      </div>
      <canvas id="gc" height="150"></canvas>
      <p style="font-size:11px;color:var(--muted);margin-top:.3rem" id="trap-count">${(roomData.traps||[]).length} trap(s) placed</p>
      ${amHost()?`<button class="btn btn-primary" style="margin-top:.5rem" id="start-race-btn" onclick="hostStartRace()">Start Race! →</button>`:''}
    </div>`;
  setupCanvas('gc');
  drawMap();
  startBuildCountdown();
}

let buildCountdown=null;
function startBuildCountdown(){
  if(buildCountdown)clearInterval(buildCountdown);
  buildCountdown=setInterval(()=>{
    const el=document.getElementById('build-timer');
    if(!el){clearInterval(buildCountdown);return;}
    const rem=Math.max(0,Math.ceil((roomData.timer-Date.now())/1000));
    el.textContent=rem+'s';
    if(rem<=0){clearInterval(buildCountdown);}
  },500);
}

function refreshBuildCanvas(){
  myMap=getMap(roomData.mapId||'grass');
  const tc=document.getElementById('trap-count');
  if(tc)tc.textContent=(roomData.traps||[]).length+' trap(s) placed';
  if(canvas&&ctx)drawMap();
}

function pickTrap(id){ selectedTrap=id; showBuild(); }

async function handleCanvasClick(e) {
  if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  const px=((e.clientX||e.touches[0].clientX)-rect.left)*scaleX/canvas.width;
  const py=((e.clientY||e.touches[0].clientY)-rect.top)*scaleY/canvas.height;
  if(py<0.3||py>0.98)return;
  const traps=roomData.traps?[...roomData.traps]:[];
  traps.push({type:selectedTrap,px,py,placedBy:myId});
  await dbUpdate(`rooms/${myRoom}`,{traps});
  toast('Trap placed!');
}

async function hostStartRace() {
  const updates={ phase:'race', timer:Date.now()+RACE_DUR*1000 };
  const players=roomData.players||{};
  Object.keys(players).forEach(id=>{
    updates[`players/${id}/hp`]=100;
    updates[`players/${id}/x`]=0.03;
    updates[`players/${id}/y`]=0.65;
    updates[`players/${id}/finished`]=false;
    updates[`players/${id}/shielded`]=false;
  });
  await dbUpdate(`rooms/${myRoom}`,updates);
}

// ─── CANVAS / MAP DRAWING ────────────────────────────────────────────────────
function setupCanvas(id){
  canvas=document.getElementById(id);
  if(!canvas)return;
  canvas.width=canvas.offsetWidth||360;
  ctx=canvas.getContext('2d');
  canvas.addEventListener('click',handleCanvasClick);
  canvas.addEventListener('touchend',e=>{e.preventDefault();handleCanvasClick(e);},{passive:false});
}

function drawMap(players){
  if(!ctx||!canvas)return;
  const W=canvas.width, H=canvas.height;
  const map=myMap||MAPS[0];
  ctx.clearRect(0,0,W,H);

  // Sky
  ctx.fillStyle=map.sky; ctx.fillRect(0,0,W,H);

  // Ground
  ctx.fillStyle=map.groundLight; ctx.fillRect(0,H*0.62,W,H*0.04);
  ctx.fillStyle=map.ground;      ctx.fillRect(0,H*0.66,W,H*0.34);

  // Platforms
  for(const pl of(map.platforms||[])){
    ctx.fillStyle=map.groundLight; ctx.fillRect(pl.x*W, pl.y*H, pl.w*W, pl.h*H);
    ctx.fillStyle=map.ground;      ctx.fillRect(pl.x*W,(pl.y+pl.h)*H,pl.w*W,3);
  }

  // Start / Finish labels
  ctx.fillStyle=map.ground; ctx.font='bold 11px sans-serif';
  ctx.fillText('START',3,H*0.6);
  ctx.font='18px sans-serif';
  ctx.fillText('🏁',W-22,H*0.59);

  // Traps
  for(const t of(roomData.traps||[])){
    const td=getTrap(t.type);
    ctx.fillStyle=td.col; ctx.font='13px sans-serif';
    ctx.fillText(td.icon, t.px*W-6, t.py*H+5);
  }

  // Power-ups
  for(const pu of(roomData.powerupSpawns||[])){
    if(!pu.alive)continue;
    const pd=POWERUP_TYPES.find(x=>x.id===pu.type)||POWERUP_TYPES[0];
    ctx.fillStyle=pd.col;
    ctx.beginPath(); ctx.arc(pu.px*W, pu.py*H, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(pd.icon, pu.px*W, pu.py*H+3); ctx.textAlign='left';
  }

  // Players
  if(players){
    for(const p of players){
      const ch=getChar(p.charId);
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x*W, p.y*H, ch.size, 0, Math.PI*2); ctx.fill();
      if(p.shielded){
        ctx.strokeStyle='#639922'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(p.x*W, p.y*H, ch.size+3, 0, Math.PI*2); ctx.stroke();
        ctx.lineWidth=1;
      }
      // Character icon above
      ctx.font='12px sans-serif'; ctx.textAlign='center';
      ctx.fillText(ch.icon, p.x*W, p.y*H-ch.size-2);
      // HP bar
      const bw=18;
      ctx.fillStyle='rgba(0,0,0,0.15)';
      ctx.fillRect(p.x*W-bw/2, p.y*H+ch.size+2, bw, 3);
      ctx.fillStyle=p.hp>50?'#639922':'#E24B4A';
      ctx.fillRect(p.x*W-bw/2, p.y*H+ch.size+2, bw*(p.hp/100), 3);
      ctx.textAlign='left';
    }
  }
}

// ─── RACE PHASE ──────────────────────────────────────────────────────────────
function initRaceUI(){
  myMap=getMap(roomData.mapId||'grass');
  myChar=getChar((roomData.players[myId]||{}).charId||'ninja');
  myX=0.03; myY=0.65; myVX=0; myVY=0; myHP=100; myFinished=false; myJumps=0;
  shielded=false; boosted=false; activePowerup=null;
  showRaceUI();
}

function showRaceUI(){
  const rem=Math.max(0,Math.ceil((roomData.timer-Date.now())/1000));
  document.getElementById('app').innerHTML=`
    <div class="card" style="padding:.85rem">
      <div class="info-bar">
        <span class="badge b-race" style="margin:0" id="race-badge">Race! ${rem}s</span>
        <span style="font-size:13px;color:var(--muted)">HP: <b id="hpv" style="color:#E24B4A">${Math.round(myHP)}</b><span id="pu-pill"></span></span>
      </div>
      <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:${myHP}%"></div></div>
      <canvas id="gc" height="160"></canvas>
      <div class="controls">
        <div class="ctrl-btn" id="btn-run"
          onpointerdown="moving=true" onpointerup="moving=false" onpointerleave="moving=false"
          ontouchstart="moving=true;event.preventDefault()" ontouchend="moving=false">&#9654; Run</div>
        <div class="ctrl-btn"
          onpointerdown="doJump()" ontouchstart="doJump();event.preventDefault()">&#8593; Jump</div>
        <div class="ctrl-btn"
          onpointerdown="usePowerup()" ontouchstart="usePowerup();event.preventDefault()">&#9733; Use</div>
      </div>
      <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:.3rem">Hold Run, tap Jump, tap Use to activate powerup</p>
    </div>`;
  setupCanvas('gc');
  drawMap(getPlayerList());
  if(raceTimer)clearInterval(raceTimer);
  raceTimer=setInterval(raceStep,50);
}

function getPlayerList(){
  return Object.entries(roomData.players||{}).map(([id,p])=>{
    if(id===myId)return{...p,id,x:myX,y:myY,hp:myHP,shielded};
    return{...p,id};
  });
}

function doJump(){
  const maxJ=myChar.dblJump?2:1;
  if(myJumps<maxJ){ myVY=myChar.jump; myJumps++; }
}

async function usePowerup(){
  if(!activePowerup)return;
  if(activePowerup==='shield'){ shielded=true; setTimeout(()=>{shielded=false;},8000); toast('Shield active for 8s!'); }
  if(activePowerup==='boost'){  boosted=true;  setTimeout(()=>{boosted=false;},5000);  toast('Speed boost 5s!'); }
  if(activePowerup==='heal'){   myHP=Math.min(100,myHP+40); toast('+40 HP!'); }
  activePowerup=null;
  await dbUpdate(`rooms/${myRoom}/players/${myId}`,{powerup:null,shielded});
}

async function raceStep(){
  if(!roomData||roomData.phase!=='race'){ clearInterval(raceTimer); return; }
  const map=myMap||MAPS[0];
  const gravity=myChar.slowFall?0.0016:0.0032;
  const spd=boosted?myChar.speed*1.6:myChar.speed;

  if(moving&&!myFinished) myVX=spd; else myVX=0;
  myVY+=gravity;
  myX+=myVX; myY+=myVY;

  // Ground collision
  if(myY>=0.65){ myY=0.65; myVY=0; myJumps=0; }

  // Platform collision
  for(const pl of(map.platforms||[])){
    if(myX>=pl.x&&myX<=pl.x+pl.w&&myY>=pl.y&&myY<=pl.y+pl.h&&myVY>0){
      myY=pl.y; myVY=0; myJumps=0;
      if(map.slippery&&!myChar.iceImmune) myVX*=1.03;
    }
  }

  myX=Math.max(0.01,Math.min(0.98,myX));
  if(myX>=0.95&&!myFinished){ myFinished=true; myVX=0; toast('You finished! 🏁'); }

  // Trap collisions
  if(!myFinished&&!shielded){
    for(const t of(roomData.traps||[])){
      const td=getTrap(t.type);
      const dx=Math.abs(myX-t.px), dy=Math.abs(myY-t.py);
      if(dx<0.045&&dy<0.12){
        if(td.dmg){
          let d=td.dmg;
          if(myChar.armor) d*=0.7;
          if(myChar.ghost&&t.type==='spike') d=0;
          myHP=Math.max(0,myHP-d*0.045);
        }
        if(td.slow&&!myChar.iceImmune) myVX*=0.35;
        if(td.bounce){ myVY=myChar.jump*0.85; myJumps=0; }
        if(td.sticky) myVX=0;
      }
    }
  }

  // Powerup pickup
  const spawns=roomData.powerupSpawns||[];
  for(let i=0;i<spawns.length;i++){
    const pu=spawns[i];
    if(!pu.alive)continue;
    if(Math.abs(myX-pu.px)<0.06&&Math.abs(myY-pu.py)<0.12){
      activePowerup=pu.type;
      pu.alive=false;
      toast('Picked up '+POWERUP_TYPES.find(x=>x.id===pu.type)?.lbl+'!');
    }
  }

  // Update DOM
  const hpv=document.getElementById('hpv');
  const hpf=document.getElementById('hp-fill');
  const badge=document.getElementById('race-badge');
  const ppill=document.getElementById('pu-pill');
  const rem=Math.max(0,Math.ceil((roomData.timer-Date.now())/1000));
  if(hpv) hpv.textContent=Math.round(myHP);
  if(hpf) hpf.style.width=Math.round(myHP)+'%';
  if(badge) badge.textContent='Race! '+rem+'s';
  if(ppill) ppill.innerHTML=activePowerup?`<span class="pu-pill">${activePowerup}</span>`:'';

  drawMap(getPlayerList());

  // Sync to Firebase every 600ms
  const now=Date.now();
  if(now-lastSave>600){
    lastSave=now;
    const playerUpdate={
      x:myX, y:myY, hp:Math.round(myHP),
      finished:myFinished, shielded
    };
    const updates={ [`players/${myId}`]:playerUpdate, powerupSpawns:spawns };
    if(amHost()){
      const expired=Date.now()>roomData.timer;
      const allDone=Object.values(roomData.players).every(p=>p.finished||p.hp<=0);
      if(expired||allDone){
        calcScores();
        updates.phase='results';
      }
    }
    await dbUpdate(`rooms/${myRoom}`,updates).catch(()=>{});
  }
}

function calcScores(){
  const players=roomData.players||{};
  Object.keys(players).forEach(id=>{
    const p=players[id];
    const pts=(p.finished?100:0)+Math.round(p.hp||0);
    roomData.players[id].score=(p.score||0)+pts;
  });
}

// ─── RESULTS ──────────────────────────────────────────────────────────────────
function showResults(){
  if(raceTimer){clearInterval(raceTimer);raceTimer=null;}
  const ps=Object.values(roomData.players||{}).sort((a,b)=>(b.score||0)-(a.score||0));
  const medals=['🥇','🥈','🥉'];
  document.getElementById('app').innerHTML=`
    <div class="card">
      <span class="badge b-done">Round over</span>
      <h2>Leaderboard</h2>
      ${ps.map((p,i)=>{
        const ch=getChar(p.charId);
        return`<div class="row">
          <span><span class="dot" style="background:${p.color}"></span>
          <span class="medal">${medals[i]||''}</span> ${ch.icon} ${p.name}</span>
          <span class="${i===0?'gold':''}">${p.score||0} pts</span>
        </div>`;
      }).join('')}
      <p style="font-size:12px;margin-top:.5rem">Finish bonus: 100 pts + remaining HP</p>
      ${amHost()?`
        <div class="btn-row" style="margin-top:.75rem">
          <button class="btn" onclick="hostGoMapSelect()">New Map</button>
          <button class="btn btn-primary" onclick="hostPlayAgain()">Play Again</button>
        </div>`
      :`<p style="text-align:center;margin-top:.75rem;font-size:13px">⏳ Waiting for host...</p>`}
    </div>`;
}

async function hostPlayAgain(){
  const map=getMap(roomData.mapId||'grass');
  const spawns=[
    {px:0.3,py:map.platforms.length?0.37:0.55,type:POWERUP_TYPES[Math.floor(Math.random()*3)].id,alive:true},
    {px:0.62,py:map.platforms.length?0.34:0.55,type:POWERUP_TYPES[Math.floor(Math.random()*3)].id,alive:true},
  ];
  const updates={phase:'build',timer:Date.now()+BUILD_DUR*1000,traps:[],powerupSpawns:spawns};
  const players=roomData.players||{};
  Object.keys(players).forEach(id=>{
    updates[`players/${id}/hp`]=100;
    updates[`players/${id}/x`]=0.03;
    updates[`players/${id}/y`]=0.65;
    updates[`players/${id}/finished`]=false;
    updates[`players/${id}/shielded`]=false;
  });
  await dbUpdate(`rooms/${myRoom}`,updates);
}

// ─── EXPOSE TO HTML onclick ───────────────────────────────────────────────────
window.joinRoom=joinRoom;
window.pickChar=pickChar;
window.hostGoMapSelect=hostGoMapSelect;
window.pickMap=pickMap;
window.hostStartBuild=hostStartBuild;
window.pickTrap=pickTrap;
window.hostStartRace=hostStartRace;
window.doJump=doJump;
window.usePowerup=usePowerup;
window.hostPlayAgain=hostPlayAgain;
window.moving=false;
Object.defineProperty(window,'moving',{get:()=>moving,set:v=>moving=v});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
function boot(){
  const ok=initFirebase();
  document.getElementById('app').innerHTML=`
    <div class="card">
      <h1>Trap Race Deluxe 🏁</h1>
      <p style="margin-bottom:.75rem">Place traps, then race. 60-second runs, 6 characters, 4 maps, powerups.</p>
      ${!ok||FIREBASE_CONFIG.apiKey==='REPLACE_WITH_YOUR_API_KEY'?`
        <div class="firebase-note">
          ⚠️ <b>Setup needed:</b> Open <code>index.html</code> and replace the Firebase config values at the top of the script with your own Firebase project credentials.<br><br>
          <a href="https://console.firebase.google.com" target="_blank" style="color:var(--info-txt)">→ Get free Firebase credentials</a>
        </div>`:''}
      <input type="text" id="iname" placeholder="Your name" maxlength="14"/>
      <input type="text" id="iroom" placeholder="Room code (leave blank to create)" maxlength="8"
             style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn btn-primary" onclick="joinRoom()">Join / Create Room →</button>
    </div>`;
}

boot();
</script>
